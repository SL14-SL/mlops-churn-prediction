project:
  name: mlops-churn-prediction
  domain: prediction
  schema_version: v1

model:
  type: gradient_boosting
  params:
    n_estimators: 200
    max_depth: 3
    learning_rate: 0.05

data:
  target_column: Churn
  known_targets: 
    - Churn
  time_column: null
  id_columns:
    - customerID
  primary_keys:
    - []

  feature_sources:
    train:
      path: Telco-Customer-Churn.csv

  versioning_sources:
    raw_churn:
      path_key: raw_data
      file: Telco-Customer-Churn.csv

    validated_train:
      path_key: validated_data
      file: train.parquet

    features:
      path_key: features
      file: features.parquet

    split_train:
      path_key: splits
      file: train.parquet

    split_val:
      path_key: splits
      file: val.parquet

training:
  validation_strategy: holdout
  test_size: 0.2
  target_transformation: none

metrics:
  primary: f1_score
  secondary:
    - roc_auc
    - accuracy
  evaluate_on_original_scale: true

features:
  features:
  # Define which steps from src/data/features/core.py should run
  enabled_steps:
    - clean_names
    - cast_numeric_types
    - encode_categoricals
    - drop_configured
    - cast_ohe_to_bool
    
  # These columns need to be cast from String to Float (Notebook logic)
  cast_to_numeric:
    - totalcharges

  # Numeric features
  numeric_columns:
    - tenure
    - monthlycharges
    - totalcharges

  # Categorical features for One-Hot-Encoding
  categorical_columns:
    - gender
    - seniorcitizen
    - partner
    - dependents
    - phoneservice
    - multiplelines
    - internetservice
    - onlinesecurity
    - onlinebackup
    - deviceprotection
    - techsupport
    - streamingtv
    - streamingmovies
    - contract
    - paperlessbilling
    - paymentmethod

  # Columns that add no value to the model
  drop_columns:
    - customerid