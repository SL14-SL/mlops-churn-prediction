feature_drift:
  enabled: true
  use_training_feature_config: true

  min_samples: 50
  p_value_threshold: 0.01
  stat_threshold: 0.10

data_quality:
  enabled: true
  persist_history: false
  use_training_feature_config: true

performance:
  enabled: true

  target_column: churn
  probability_column: churn_probability
  prediction_column: churn_prediction
  action_column: action

  threshold: 0.5

  retrain_thresholds:
    min_f1: 0.60
    min_recall: 0.65
    min_roc_auc: 0.75
    max_brier_score: 0.22

business:
  enabled: true

  min_expected_profit: 0.0
  customer_value: 100
  cost_discount: 10
  cost_contact: 2
  discount_uplift: 0.3
  contact_uplift: 0.1
  max_discount_budget: 20
  max_discount_rate: 0.2

delayed_labels:
  enabled: true

  prediction_id_column: prediction_id
  entity_id_column: customerid
  prediction_time_column: prediction_time
  label_available_time_column: label_available_at
  target_column: churn

  min_label_delay_days: 30
  max_label_delay_days: 60

serving:
  enabled: true
  metrics_endpoint_enabled: true
  summary_endpoint_enabled: true

  summary_window_seconds: 900

  track_paths:
    - /predict
    - /health

  ignored_paths:
    - /metrics
    - /monitoring/summary
    - /docs
    - /openapi.json
    - /redoc